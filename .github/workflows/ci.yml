name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore src/SalesToSignature.sln

      - name: Build
        run: dotnet build src/SalesToSignature.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test src/SalesToSignature.sln --configuration Release --no-build
