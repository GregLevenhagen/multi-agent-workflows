name: Feature request
description: Propose a scoped improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user or maintainer problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you want to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe alternatives or why the current behavior is not sufficient.
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Include constraints, tradeoffs, or examples.
