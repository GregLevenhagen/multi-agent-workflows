$schema: https://aka.ms/agent-manifest-schema
name: sales-to-signature
description: >
  Multi-agent pipeline for consulting sales-to-signature workflow.
  Routes RFPs through Intake, Qualification, Proposal, Contract, Review,
  and Approval agents using Handoff orchestration.
version: 1.0.0

environment:
  - name: AZURE_AI_PROJECT_ENDPOINT
    description: Azure AI Foundry project endpoint URL
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    description: Model deployment name (e.g., gpt-4o)
  - name: AZURE_CONTENT_SAFETY_ENDPOINT
    description: Azure Content Safety endpoint URL
  - name: AZURE_CONTENT_SAFETY_KEY
    description: Azure Content Safety API key
  - name: APPLICATIONINSIGHTS_CONNECTION_STRING
    description: Application Insights connection string for OpenTelemetry
  - name: OTEL_CONSOLE_EXPORT
    description: Set to 'true' to enable console OTel export for local debugging
