# Local development Docker Compose for Sales-to-Signature Multi-Agent Pipeline
#
# Usage:
#   1. Copy .env.example to .env and fill in your Azure credentials
#   2. docker compose up --build
#   3. POST to http://localhost:8080/responses with {"input": "<RFP text>"}
#
# The agent service mounts ./data as a read-only volume so tools can
# access RFP templates, rate cards, legal templates, and clause libraries.

services:
  agent:
    build:
      context: src/SalesToSignature.Agents
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data:ro
    env_file:
      - .env
    environment:
      - DATA_DIRECTORY=/app/data
      - DOTNET_ENVIRONMENT=development
    restart: unless-stopped
